version: '3.8'

services:
  eldercare:
    build: .
    ports:
      - "80:80"
    environment:
      - PORT=5000
    volumes:
      - ./backend/data:/app/backend/data  # Persist SQLite data
    restart: unless-stopped
    # Add healthcheck for VPS monitoring
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s